name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish / update"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/native-build.yml
    with:
      make_target: native-dist
      upload_dist: true
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download linux native-dist
        uses: actions/download-artifact@v4
        with:
          name: native-dist-ubuntu-latest
          path: build/native-dist

      - name: List native-dist inputs
        run: ls -la build/native-dist

      - name: Build docker-dist
        run: make docker-dist

      - name: Upload docker-dist
        uses: actions/upload-artifact@v4
        with:
          name: docker-dist
          path: build/docker-dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download native-dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-dist-*
          merge-multiple: true
          path: dist

      - name: Download docker-dist artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-dist
          path: dist

      - name: List release files
        run: ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
