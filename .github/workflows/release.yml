name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish / update"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/native-build.yml
    with:
      make_target: openfoam-dist
      upload_dist: true
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openfoam-dist-*
          merge-multiple: true
          path: dist

      - name: List release files
        run: ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
