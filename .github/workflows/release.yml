name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish / update"
        required: true
        type: string

concurrency:
  # Do not share with CI — cancelling main CI leaves a red/cancelled check
  # on the branch commit even when Release succeeded.
  group: release-${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/native-build.yml
    with:
      make_target: dist-native
      upload_dist: true
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      # linux amd64 + linux arm64 + macOS (darwin arm64 on macos-latest)
      runners: '["ubuntu-latest", "ubuntu-24.04-arm", "macos-latest"]'

  docker:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            native_artifact: dist-native-ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            native_artifact: dist-native-ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download matching linux dist-native
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.native_artifact }}
          path: build/dist-native

      - name: List dist-native inputs
        run: ls -la build/dist-native

      - name: Build dist-docker (${{ matrix.arch }})
        # Pass as make arg (not env): makefile `=` assignments override the environment.
        run: make DOCKER_ARCH=${{ matrix.arch }} dist-docker

      - name: Upload docker image (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: dist-docker-${{ matrix.arch }}
          path: build/dist-docker/phynexis-foam-docker-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [build, docker]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download dist-native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-native-*
          merge-multiple: true
          path: dist

      - name: Download docker images
        if: needs.docker.result == 'success' || needs.docker.result == 'failure'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: dist-docker-*
          merge-multiple: true
          path: dist

      - name: Deduplicate release assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          declare -A seen=()
          for f in dist/*; do
            [[ -f "$f" ]] || continue
            base="$(basename "$f")"
            if [[ -n "${seen[$base]:-}" ]]; then
              echo "Removing duplicate: $base"
              rm -f "$f"
            else
              seen[$base]=1
            fi
          done
          native=(dist/phynexis-foam-[0-9]*)
          if ((${#native[@]} == 0)); then
            echo "No dist-native release assets under dist/" >&2
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          echo "==> Release assets"
          ls -la dist
          if [[ "${{ needs.docker.result }}" != "success" ]]; then
            echo "::warning::Docker job did not succeed; publishing native assets only."
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          body: |
            ## Install

            | Platform | OpenFOAM | CLI |
            |----------|----------|-----|
            | **macOS** | `phynexis-foam install phynexis-foam-*-darwin-arm64.tar.gz` | `pip install phynexis_foam-*.whl` (or the pack-embedded `bin/phynexis-foam`) |
            | **Linux** | `phynexis-foam install phynexis-foam-*-linux-*.tar.gz` (amd64 / arm64) | same wheel |
            | **Windows / Docker** | `phynexis-foam docker install-image` with `phynexis-foam-docker-*-linux-amd64.tar.gz` or `*-linux-arm64.tar.gz` | host `pip install phynexis_foam-*.whl` |

            Native (macOS needs a case-sensitive volume; default prefix `/opt/openfoam`):

            ```bash
            pip install phynexis_foam-*.whl
            phynexis-foam install phynexis-foam-*-darwin-arm64.tar.gz   # or linux-*
            source /opt/openfoam/etc/bashrc
            ```

            Docker (Linux images only; Docker Desktop on macOS/Windows still runs Linux):

            ```bash
            pip install phynexis_foam-*.whl
            # pick amd64 or arm64 to match the machine / Docker platform
            phynexis-foam docker install-image phynexis-foam-docker-*-linux-amd64.tar.gz
            # phynexis-foam docker install-image phynexis-foam-docker-*-linux-arm64.tar.gz
            phynexis-foam docker run …
            ```

            Notes:
            - There is no macOS Docker image.
            - Release ships Linux Docker for `amd64` and `arm64`.
