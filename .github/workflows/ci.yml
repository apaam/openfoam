name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_JOBS: 2
  DOCKER_JOBS: 2
  OPENFOAM_BUILD_MODULES: 0

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          mapfile -t pkgs < <(grep -v '^#' docker/phynexis_build_packages.txt | grep -v '^[[:space:]]*$')
          sudo apt-get install -y "${pkgs[@]}"
          sudo python3 -m pip install --break-system-packages setuptools wheel mpi4py

      - name: Install Python packaging (macOS)
        if: runner.os == 'macOS'
        run: python3 -m pip install setuptools wheel

      - run: make help
      - run: make cli-wheel

  docker:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - uses: docker/setup-buildx-action@v3

      - run: make docker-build
