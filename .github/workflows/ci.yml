name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    uses: ./.github/workflows/native-build.yml
    with:
      make_target: all
      upload_dist: false
