name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Keep CI concurrency separate from Release. Sharing a group with
  # cancel-in-progress marked tag-owned main CI as cancelled (red on main).
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.decide.outputs.run_ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin --tags --force 2>/dev/null || true
          if git tag --points-at HEAD | grep -qE '^v'; then
            echo "Version tag points at this commit; skipping CI (Release owns it)."
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
          fi

  native:
    needs: gate
    if: needs.gate.outputs.run_ci == 'true'
    uses: ./.github/workflows/native-build.yml
    with:
      make_target: all
      upload_dist: false

  # Stable check for branch status: green on intentional skip or native success;
  # red if native/gate failed or was cancelled (do not leave this job skipped).
  result:
    needs: [gate, native]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate CI status
        run: |
          set -euo pipefail
          echo "gate=${{ needs.gate.result }} run_ci=${{ needs.gate.outputs.run_ci }} native=${{ needs.native.result }}"
          if [[ "${{ needs.gate.result }}" != "success" ]]; then
            echo "gate did not succeed"; exit 1
          fi
          if [[ "${{ needs.gate.outputs.run_ci }}" != "true" ]]; then
            echo "CI skipped: version tag owns this commit (Release)."
            exit 0
          fi
          if [[ "${{ needs.native.result }}" != "success" ]]; then
            echo "native did not succeed"; exit 1
          fi
          echo "CI native build succeeded."
